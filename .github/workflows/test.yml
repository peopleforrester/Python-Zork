name: tests

on:
  push:
    branches: [staging, master, main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Lint with ruff
        run: uv run ruff check computerquest tests

      - name: Type-check with mypy
        # Soft-fail until Step 3.4 lands strict annotations on the four
        # target modules; revisit after that step is merged.
        run: uv run mypy computerquest || true

      - name: Run pytest
        run: uv run pytest --cov=computerquest --cov-report=term --cov-report=xml

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn
