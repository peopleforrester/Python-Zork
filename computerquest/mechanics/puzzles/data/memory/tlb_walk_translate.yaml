# Canonical answer per the translate simulator: 9 * 4096 + 0x234 = 0x9234.
id: tlb_walk_translate
component_category: memory
subject_area: memory
difficulty: 3
title: "Page walk: translate a virtual address by hand"
simulator: tlb_translate
prompt: |
  Pages are 4 KB. The page table holds:

    VPN 0 -> PFN 5
    VPN 1 -> PFN 9

  Translate virtual address 0x1234 to its physical address. Answer in
  decimal or 0x hex.
setup:
  page_size: 4096
  page_table: {0: 5, 1: 9}
  vaddr: 0x1234
answer_kind: number
answer_grammar: "one physical address, decimal or 0x hex"
hints:
  - "Split the address: VPN = vaddr / 4096, offset = vaddr mod 4096."
  - "Physical = PFN * 4096 + offset. 0x1234 sits in VPN 1 with offset 0x234."
explanation: |
  0x1234 splits into VPN 1 (0x1234 / 0x1000) and offset 0x234. The page
  table maps VPN 1 to PFN 9, so the physical address is 9 * 4096 + 0x234
  = 0x9234 (37428 decimal). The offset passes through untouched: paging
  relocates pages, never bytes within a page.
