# Canonical answer per the packet simulator: kernel cpu_package pch nic.
id: packet_route_reply
component_category: networking
subject_area: networking
difficulty: 2
title: "Packet routing: the reply takes its own path"
simulator: packet
prompt: |
  The kernel answers a request that originally arrived from the nic.
  Reply routing uses these rows:

    kernel:      nic -> cpu_package
    cpu_package: nic -> pch
    pch:         nic -> nic

  List every component the reply visits, in order, from kernel to nic.
setup:
  routes:
    kernel: {nic: cpu_package}
    cpu_package: {nic: pch}
    pch: {nic: nic}
  src: kernel
  dst: nic
answer_kind: sequence
answer_grammar: "component names in visit order, separated by spaces"
hints:
  - "Same idea as the inbound trace, but read the tables for destination nic."
explanation: |
  kernel, cpu_package, pch, nic. The reply needed its own table rows;
  nothing about the inbound path automatically creates a way back.

  Forward and return paths are independent decisions in real networks
  too, and they frequently differ (asymmetric routing). Every firewall
  engineer has a scar with this lesson's name on it.
