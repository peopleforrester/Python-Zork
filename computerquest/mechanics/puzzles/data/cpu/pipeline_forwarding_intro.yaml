# The hazard chain from the architecture doc's cpu_workload sketch, with
# forwarding enabled. Canonical answer per the pipeline simulator: 8 cycles
# (one unavoidable load-use bubble; the ADD->STORE hazard forwards for free).
id: pipeline_forwarding_intro
component_category: cpu
subject_area: cpu
difficulty: 2
title: "Pipeline — count the cycles with forwarding on"
simulator: pipeline
prompt: |
  A classic 5-stage pipeline (IF, ID, EX, MEM, WB) with forwarding enabled
  runs this straight-line program:

    LOAD  R2 <- [R1]
    ADD   R4 <- R2 + R3
    STORE [R1] <- R4

  Forwarding routes an ALU result straight from EX to the next
  instruction's EX, and a loaded value from MEM. In how many total cycles
  does the last instruction complete WB?
setup:
  stages: 5
  forwarding: true
  instructions:
    - ["LOAD", ["R1"], "R2"]
    - ["ADD", ["R2", "R3"], "R4"]
    - ["STORE", ["R4", "R1"], null]
answer_kind: number
answer_grammar: "a single whole number of cycles"
hints:
  - "Without any hazards, 3 instructions in a 5-stage pipeline take 5 + 2 = 7 cycles."
  - "Forwarding erases the ADD->STORE hazard entirely, but a LOAD's value only exists after MEM — the dependent ADD must wait one cycle."
explanation: |
  An ideal run would take 7 cycles (5 to fill the pipe, 1 more per extra
  instruction). The LOAD -> ADD dependency costs exactly one bubble: the
  loaded value exists after MEM in cycle 4, so ADD's EX slips from cycle 4
  to cycle 5. The ADD -> STORE dependency costs nothing, because the ADD
  result forwards out of EX directly into STORE's EX. Total: 8 cycles.

  This is the load-use hazard: the one data hazard forwarding cannot fully
  hide. Compilers fill that slot with an unrelated instruction when they
  can; when they cannot, the hardware inserts the bubble you just counted.
