# Canonical answer per the pipeline simulator: 7 cycles (one bubble).
id: pipeline_load_use
component_category: cpu
subject_area: cpu
difficulty: 1
title: "Pipeline: the one bubble forwarding cannot fix"
simulator: pipeline
prompt: |
  Two instructions on a 5-stage pipeline WITH forwarding:

    LOAD R2 <- [R1]
    ADD  R4 <- R2 + R3

  A loaded value only exists after the LOAD's MEM stage. In how many
  total cycles does the ADD complete WB?
setup:
  stages: 5
  forwarding: true
  instructions:
    - ["LOAD", ["R1"], "R2"]
    - ["ADD", ["R2", "R3"], "R4"]
answer_kind: number
answer_grammar: "a single whole number of cycles"
hints:
  - "Two independent instructions would take 5 + 1 = 6 cycles. Count the wait."
explanation: |
  Ideal would be 6 cycles. The LOAD's data appears after MEM in cycle 4,
  so the ADD's EX slips from cycle 4 to cycle 5 and it retires in cycle
  7. One bubble, and no amount of forwarding hardware removes it: the
  value physically does not exist yet.

  This load-use hazard is why compilers try to place an unrelated
  instruction between a load and its first consumer.
