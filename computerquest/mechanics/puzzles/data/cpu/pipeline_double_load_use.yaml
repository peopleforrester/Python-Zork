# Canonical answer per the pipeline simulator: 10 cycles (two bubbles).
id: pipeline_double_load_use
component_category: cpu
subject_area: cpu
difficulty: 3
title: "Pipeline: two load-use chains back to back"
simulator: pipeline
prompt: |
  Four instructions on a 5-stage pipeline WITH forwarding. Each LOAD
  feeds the ADD right behind it:

    LOAD R2 <- [R1]
    ADD  R4 <- R2 + R3
    LOAD R6 <- [R5]
    ADD  R8 <- R6 + R7

  In how many total cycles does the last ADD complete WB?
setup:
  stages: 5
  forwarding: true
  instructions:
    - ["LOAD", ["R1"], "R2"]
    - ["ADD", ["R2", "R3"], "R4"]
    - ["LOAD", ["R5"], "R6"]
    - ["ADD", ["R6", "R7"], "R8"]
answer_kind: number
answer_grammar: "a single whole number of cycles"
hints:
  - "Ideal for four instructions is 5 + 3 = 8. Each load-use pair adds one bubble."
  - "The second LOAD is independent, but its consumer still waits for its MEM."
explanation: |
  Each LOAD-ADD pair costs one unavoidable bubble, and the pipeline
  stays busy in between: the first ADD executes in cycle 5, the second
  LOAD slots into cycle 6 without stalling, and the final ADD waits for
  that LOAD's data, executing in cycle 8 and retiring in cycle 10.
  Ideal 8 plus two bubbles.

  Reordering the program as LOAD, LOAD, ADD, ADD would hide both
  bubbles and hit the ideal 8. Instruction scheduling is exactly this
  game.
